<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bharles Cabbage - Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #1a472a 0%, #2d5a3f 50%, #1a472a 100%);
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #fff;
      pointer-events: none;
    }

    .content > * {
      pointer-events: auto;
    }

    h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c8e6c9;
      text-shadow:
        0 0 20px rgba(144, 238, 144, 0.8),
        0 0 40px rgba(144, 238, 144, 0.6),
        0 0 60px rgba(144, 238, 144, 0.4),
        3px 3px 0 rgba(0, 100, 0, 0.5);
      animation: glow 2s ease-in-out infinite alternate;
      margin-bottom: 0.5rem;
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 20px rgba(144, 238, 144, 0.8),
          0 0 40px rgba(144, 238, 144, 0.6),
          0 0 60px rgba(144, 238, 144, 0.4),
          3px 3px 0 rgba(0, 100, 0, 0.5);
      }
      to {
        text-shadow:
          0 0 30px rgba(144, 238, 144, 1),
          0 0 60px rgba(144, 238, 144, 0.8),
          0 0 90px rgba(144, 238, 144, 0.6),
          4px 4px 0 rgba(0, 120, 0, 0.6);
      }
    }

    .subtitle {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 600;
      color: #a5d6a7;
      text-shadow: 2px 2px 4px rgba(0, 50, 0, 0.5);
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .cabbage-icon {
      font-size: clamp(4rem, 10vw, 8rem);
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 30px rgba(144, 238, 144, 0.8));
      animation: rotate3d 8s linear infinite;
      display: inline-block;
    }

    @keyframes rotate3d {
      0% { transform: rotateY(0deg) rotateX(10deg); }
      100% { transform: rotateY(360deg) rotateX(10deg); }
    }

    .notify-form {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2rem;
    }

    .notify-form input {
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      border: 2px solid #81c784;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      color: #fff;
      outline: none;
      transition: all 0.3s ease;
    }

    .notify-form input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }

    .notify-form input:focus {
      border-color: #a5d6a7;
      background: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(144, 238, 144, 0.5);
    }

    .notify-form button {
      padding: 1rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #66bb6a 0%, #43a047 100%);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow:
        0 4px 15px rgba(0, 100, 0, 0.4),
        0 0 20px rgba(144, 238, 144, 0.3);
    }

    .notify-form button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow:
        0 6px 25px rgba(0, 100, 0, 0.5),
        0 0 40px rgba(144, 238, 144, 0.6);
    }

    .social-links {
      display: flex;
      gap: 1.5rem;
      margin-top: 3rem;
    }

    .social-links a {
      font-size: 2rem;
      color: #a5d6a7;
      transition: all 0.3s ease;
      text-decoration: none;
      filter: drop-shadow(0 2px 4px rgba(0, 50, 0, 0.5));
    }

    .social-links a:hover {
      color: #c8e6c9;
      transform: translateY(-5px) scale(1.2);
      filter: drop-shadow(0 5px 15px rgba(144, 238, 144, 0.8));
    }

    .leaf-decoration {
      position: fixed;
      pointer-events: none;
      z-index: 5;
      opacity: 0.3;
    }

    .leaf-1 { top: 10%; left: 5%; font-size: 8rem; animation: sway 4s ease-in-out infinite; }
    .leaf-2 { top: 20%; right: 5%; font-size: 6rem; animation: sway 5s ease-in-out infinite reverse; }
    .leaf-3 { bottom: 15%; left: 8%; font-size: 5rem; animation: sway 4.5s ease-in-out infinite; }
    .leaf-4 { bottom: 10%; right: 10%; font-size: 7rem; animation: sway 5.5s ease-in-out infinite reverse; }

    @keyframes sway {
      0%, 100% { transform: rotate(-10deg); }
      50% { transform: rotate(10deg); }
    }

    .scroll-indicator {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #a5d6a7;
      font-size: 2rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(10px); }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="leaf-decoration leaf-1">🥬</div>
  <div class="leaf-decoration leaf-2">🌿</div>
  <div class="leaf-decoration leaf-3">🍃</div>
  <div class="leaf-decoration leaf-4">🥬</div>

  <div class="content">
    <div class="cabbage-icon">🥬</div>
    <h1>Bharles Cabbage</h1>
    <p class="subtitle">Something Fresh is Growing...</p>
    <p style="font-size: 1.3rem; color: #81c784;">Coming Soon</p>
  </div>

  <div class="scroll-indicator">🥬</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // Three.js 3D Scene
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Create floating cabbage leaves
    const leaves = [];
    const leafGeometries = [];

    // Create multiple leaf geometries for variety
    for (let i = 0; i < 5; i++) {
      const shape = new THREE.Shape();
      const width = 0.5 + Math.random() * 0.5;
      const height = 1 + Math.random() * 0.5;

      shape.moveTo(0, 0);
      shape.quadraticCurveTo(width, height * 0.3, width, height * 0.5);
      shape.quadraticCurveTo(width * 0.5, height, 0, height);
      shape.quadraticCurveTo(-width * 0.5, height, -width, height * 0.5);
      shape.quadraticCurveTo(-width, height * 0.3, 0, 0);

      const geometry = new THREE.ShapeGeometry(shape);
      leafGeometries.push(geometry);
    }

    const leafMaterial = new THREE.MeshPhongMaterial({
      color: 0x66bb6a,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0.8,
      shininess: 100
    });

    // Create 50 floating leaves
    for (let i = 0; i < 50; i++) {
      const geometry = leafGeometries[Math.floor(Math.random() * leafGeometries.length)];
      const leaf = new THREE.Mesh(geometry, leafMaterial);

      leaf.position.x = (Math.random() - 0.5) * 30;
      leaf.position.y = (Math.random() - 0.5) * 30;
      leaf.position.z = (Math.random() - 0.5) * 20 - 5;

      leaf.rotation.x = Math.random() * Math.PI;
      leaf.rotation.y = Math.random() * Math.PI;
      leaf.rotation.z = Math.random() * Math.PI;

      leaf.userData = {
        rotSpeedX: (Math.random() - 0.5) * 0.02,
        rotSpeedY: (Math.random() - 0.5) * 0.02,
        rotSpeedZ: (Math.random() - 0.5) * 0.02,
        floatSpeed: 0.005 + Math.random() * 0.01,
        floatOffset: Math.random() * Math.PI * 2,
        originalY: leaf.position.y
      };

      scene.add(leaf);
      leaves.push(leaf);
    }

    // Create 3D cabbage spheres
    const cabbages = [];
    const cabbageGeometry = new THREE.IcosahedronGeometry(1, 2);
    const cabbageMaterial = new THREE.MeshPhongMaterial({
      color: 0x81c784,
      shininess: 80,
      flatShading: true
    });

    for (let i = 0; i < 5; i++) {
      const cabbage = new THREE.Mesh(cabbageGeometry, cabbageMaterial);
      cabbage.position.x = (Math.random() - 0.5) * 20;
      cabbage.position.y = (Math.random() - 0.5) * 20;
      cabbage.position.z = (Math.random() - 0.5) * 10 - 8;

      cabbage.userData = {
        rotSpeed: 0.005 + Math.random() * 0.01,
        floatSpeed: 0.003 + Math.random() * 0.005,
        floatOffset: Math.random() * Math.PI * 2,
        originalY: cabbage.position.y,
        scale: 0.5 + Math.random() * 1
      };

      cabbage.scale.setScalar(cabbage.userData.scale);
      scene.add(cabbage);
      cabbages.push(cabbage);
    }

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x81c784, 1, 100);
    pointLight1.position.set(10, 10, 10);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0x4caf50, 0.8, 100);
    pointLight2.position.set(-10, -10, 5);
    scene.add(pointLight2);

    const pointLight3 = new THREE.PointLight(0xa5d6a7, 0.6, 100);
    pointLight3.position.set(0, 15, -5);
    scene.add(pointLight3);

    // Camera position
    camera.position.z = 15;

    // Mouse interaction
    let mouseX = 0;
    let mouseY = 0;
    let targetX = 0;
    let targetY = 0;

    document.addEventListener('mousemove', (event) => {
      mouseX = (event.clientX - window.innerWidth / 2) * 0.001;
      mouseY = (event.clientY - window.innerHeight / 2) * 0.001;
    });

    // Animation loop
    let time = 0;
    function animate() {
      requestAnimationFrame(animate);
      time += 0.01;

      targetX += (mouseX - targetX) * 0.05;
      targetY += (mouseY - targetY) * 0.05;

      camera.position.x += (targetX * 5 - camera.position.x) * 0.05;
      camera.position.y += (-targetY * 5 - camera.position.y) * 0.05;
      camera.lookAt(scene.position);

      // Animate leaves
      leaves.forEach((leaf, i) => {
        leaf.rotation.x += leaf.userData.rotSpeedX;
        leaf.rotation.y += leaf.userData.rotSpeedY;
        leaf.rotation.z += leaf.userData.rotSpeedZ;
        leaf.position.y = leaf.userData.originalY + Math.sin(time + leaf.userData.floatOffset) * 2;
      });

      // Animate cabbages
      cabbages.forEach((cabbage) => {
        cabbage.rotation.y += cabbage.userData.rotSpeed;
        cabbage.rotation.x += cabbage.userData.rotSpeed * 0.5;
        cabbage.position.y = cabbage.userData.originalY + Math.sin(time * 2 + cabbage.userData.floatOffset) * 1.5;
      });

      renderer.render(scene, camera);
    }

    animate();

    // Handle resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
